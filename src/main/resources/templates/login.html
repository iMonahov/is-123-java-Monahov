<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вход — Админ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .login-card { max-width: 420px; margin: 100px auto; }
    </style>
</head>
<body>
<div class="container">
    <div class="login-card card shadow">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <h2 class="fw-bold">Вход в админ-панель</h2>
            </div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label class="form-label">Логин</label>
                    <input type="text" name="username" class="form-control form-control-lg" placeholder="admin" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Пароль</label>
                    <input type="password" name="password" class="form-control form-control-lg" placeholder="password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100">Войти</button>
            </form>

            <div class="text-center mt-4">
                <a href="/voting" class="text-decoration-none">
                    ← Или продолжить как обычный пользователь (тестирование)
                </a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
