<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Добавить опрос</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .navbar { background: linear-gradient(135deg, #343a40, #212529); }
        .card { border: none; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/admin">
            <i class="bi bi-shield-lock"></i> Админ-панель
        </a>
        <div>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-box-arrow-right"></i> Выйти
                </button>
            </form>
        </div>
    </div>
</nav>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0"><i class="bi bi-plus-circle"></i> Добавить новый опрос</h4>
                </div>
                <div class="card-body p-4">
                    <form action="/admin/add-poll" method="post">
                        <!-- CSRF токен - ОБЯЗАТЕЛЬНО! -->
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Вопрос опроса:</label>
                            <input type="text" name="question" class="form-control form-control-lg"
                                   placeholder="Например: Какой ваш любимый язык программирования?" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Варианты ответов:</label>
                            <div id="options-container">
                                <div class="input-group mb-2">
                                    <span class="input-group-text">1</span>
                                    <input type="text" name="options" class="form-control" placeholder="Вариант ответа" required>
                                </div>
                                <div class="input-group mb-2">
                                    <span class="input-group-text">2</span>
                                    <input type="text" name="options" class="form-control" placeholder="Вариант ответа" required>
                                </div>
                                <div class="input-group mb-2">
                                    <span class="input-group-text">3</span>
                                    <input type="text" name="options" class="form-control" placeholder="Вариант ответа">
                                </div>
                            </div>
                            <button type="button" class="btn btn-sm btn-outline-primary mt-2" onclick="addOption()">
                                <i class="bi bi-plus"></i> Добавить еще вариант
                            </button>
                            <small class="text-muted d-block mt-2">Минимум 2 варианта ответа</small>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="/admin" class="btn btn-secondary btn-lg">Отмена</a>
                            <button type="submit" class="btn btn-success btn-lg">
                                <i class="bi bi-save"></i> Сохранить опрос
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let optionCount = 3;

    function addOption() {
        optionCount++;
        const container = document.getElementById('options-container');
        const newOption = document.createElement('div');
        newOption.className = 'input-group mb-2';
        newOption.innerHTML = `
            <span class="input-group-text">${optionCount}</span>
            <input type="text" name="options" class="form-control" placeholder="Вариант ответа">
            <button type="button" class="btn btn-danger" onclick="this.parentElement.remove()">
                <i class="bi bi-trash"></i>
            </button>
        `;
        container.appendChild(newOption);
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
