<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Добавить опрос</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .navbar { background: linear-gradient(135deg, #343a40, #212529); }
        .card { border: none; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/admin">
            <i class="bi bi-shield-lock"></i> Админ-панель
        </a>
        <div>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-box-arrow-right"></i> Выйти
                </button>
            </form>
        </div>
    </div>
</nav>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-10">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0"><i class="bi bi-plus-circle"></i> Создать новый опрос</h4>
                </div>
                <div class="card-body p-4">
                    <form action="/admin/add-survey" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                        <!-- Название опроса -->
                        <div class="mb-4">
                            <label class="form-label fw-bold">Название опроса:</label>
                            <input type="text" name="title" class="form-control form-control-lg"
                                   placeholder="Например: Опрос о предпочтениях" required>
                        </div>

                        <!-- Вопросы -->
                        <div class="mb-4">
                            <label class="form-label fw-bold">Вопросы и варианты ответов:</label>
                            <div id="questions-container">
                                <div class="question-block card mb-3 p-3">
                                    <div class="d-flex justify-content-between align-items-center mb-2">
                                        <h5 class="mb-0">Вопрос 1</h5>
                                        <button type="button" class="btn btn-danger btn-sm" onclick="removeQuestion(this)">Удалить вопрос</button>
                                    </div>
                                    <input type="text" name="questions" class="form-control mb-2" placeholder="Введите вопрос" required>
                                    <div class="options-container">
                                        <div class="input-group mb-2">
                                            <span class="input-group-text">Вариант 1</span>
                                            <input type="text" name="options" class="form-control" placeholder="Вариант ответа" required>
                                        </div>
                                        <div class="input-group mb-2">
                                            <span class="input-group-text">Вариант 2</span>
                                            <input type="text" name="options" class="form-control" placeholder="Вариант ответа" required>
                                        </div>
                                        <div class="input-group mb-2">
                                            <span class="input-group-text">Вариант 3</span>
                                            <input type="text" name="options" class="form-control" placeholder="Вариант ответа">
                                        </div>
                                        <div class="input-group mb-2">
                                            <span class="input-group-text">Вариант 4</span>
                                            <input type="text" name="options" class="form-control" placeholder="Вариант ответа">
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <button type="button" class="btn btn-outline-primary mt-2" onclick="addQuestion()">
                                <i class="bi bi-plus"></i> Добавить вопрос
                            </button>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="/admin" class="btn btn-secondary btn-lg">Отмена</a>
                            <button type="submit" class="btn btn-success btn-lg">
                                <i class="bi bi-save"></i> Создать опрос
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let questionCount = 1;

    function addQuestion() {
        questionCount++;
        const container = document.getElementById('questions-container');
        const newQuestion = document.createElement('div');
        newQuestion.className = 'question-block card mb-3 p-3';
        newQuestion.innerHTML = `
            <div class="d-flex justify-content-between align-items-center mb-2">
                <h5 class="mb-0">Вопрос ${questionCount}</h5>
                <button type="button" class="btn btn-danger btn-sm" onclick="removeQuestion(this)">Удалить вопрос</button>
            </div>
            <input type="text" name="questions" class="form-control mb-2" placeholder="Введите вопрос" required>
            <div class="options-container">
                <div class="input-group mb-2">
                    <span class="input-group-text">Вариант 1</span>
                    <input type="text" name="options" class="form-control" placeholder="Вариант ответа" required>
                </div>
                <div class="input-group mb-2">
                    <span class="input-group-text">Вариант 2</span>
                    <input type="text" name="options" class="form-control" placeholder="Вариант ответа" required>
                </div>
                <div class="input-group mb-2">
                    <span class="input-group-text">Вариант 3</span>
                    <input type="text" name="options" class="form-control" placeholder="Вариант ответа">
                </div>
                <div class="input-group mb-2">
                    <span class="input-group-text">Вариант 4</span>
                    <input type="text" name="options" class="form-control" placeholder="Вариант ответа">
                </div>
            </div>
        `;
        container.appendChild(newQuestion);
    }

    function removeQuestion(button) {
        const questionBlock = button.closest('.question-block');
        questionBlock.remove();
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
