<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Голосование</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">🗳️ Главная</a>
        <a href="/voting" class="btn btn-outline-light">Обновить</a>
    </div>
</nav>

<div class="container py-5">
    <h1 class="text-center mb-5">Активные опросы</h1>

    <div th:if="${param.voted}" class="alert alert-success text-center">Спасибо за голос! ✅</div>

    <div th:each="poll : ${polls}" class="mb-5">
        <h3 class="mb-3" th:text="${poll.question}"></h3>
        <form th:action="@{/vote}" method="post" class="row g-3">
            <div th:each="option : ${poll.options}" class="col-md-6">
                <div class="form-check border p-3 rounded bg-white">
                    <input class="form-check-input" type="radio" th:id="${option.id}" name="optionId" th:value="${option.id}">
                    <label class="form-check-label fw-bold" th:for="${option.id}" th:text="${option.text}"></label>
                </div>
            </div>

            <div class="col-12 mt-3">
                <label class="form-label">Ваш возраст (необязательно):</label>
                <input type="number" name="age" min="10" max="100" class="form-control w-25" placeholder="Например: 25">
            </div>

            <button type="submit" class="btn btn-success btn-lg px-5">Проголосовать</button>
        </form>
    </div>
</div>
</body>
</html>
