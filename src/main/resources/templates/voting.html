<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Голосование</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .navbar { background: linear-gradient(135deg, #343a40, #212529); }
        .card { border: none; border-radius: 15px; transition: all 0.3s; margin-bottom: 20px; }
        .card:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        .btn-vote { background: linear-gradient(135deg, #28a745, #20c997); border: none; padding: 15px 50px; font-size: 1.2rem; border-radius: 50px; transition: all 0.3s; }
        .btn-vote:hover { transform: scale(1.05); box-shadow: 0 5px 20px rgba(40,167,69,0.4); }
        .btn-logout { background: linear-gradient(135deg, #dc3545, #c82333); border: none; }
        .btn-logout:hover { transform: scale(1.05); }
        .alert-success { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">
            <i class="bi bi-chat-dots"></i> Система голосования
        </a>
        <div class="d-flex gap-2">
            <a href="/voting" class="btn btn-outline-light">
                <i class="bi bi-arrow-repeat"></i> Обновить
            </a>
            <!-- Кнопка выхода для пользователя -->
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-logout text-white">
                    <i class="bi bi-box-arrow-right"></i> Выйти
                </button>
            </form>
        </div>
    </div>
</nav>

<div class="container py-5">
    <div class="text-center mb-5">
        <h1 class="display-4 fw-bold text-white mb-3">Голосование</h1>
        <p class="lead text-white-50">Выберите свои варианты ответов и нажмите "Проголосовать" в конце страницы</p>
    </div>

    <div th:if="${param.voted}" class="alert alert-success text-center shadow">
        <i class="bi bi-check-circle-fill fs-3"></i>
        <h4 class="mt-2">Спасибо за ваше мнение!</h4>
        <p class="mb-0">Ваш голос успешно учтен.</p>
    </div>

    <form id="votingForm" th:action="@{/vote}" method="post">
        <!-- CSRF токен -->
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div th:each="poll : ${polls}" class="card shadow">
            <div class="card-header bg-dark text-white">
                <h4 class="mb-0" th:text="${poll.question}"></h4>
                <small class="text-white-50">Выберите один вариант</small>
            </div>
            <div class="card-body">
                <div th:each="option : ${poll.options}" class="form-check border-bottom pb-2 mb-2">
                    <input type="radio"
                           class="form-check-input"
                           th:id="'option_' + ${option.id}"
                           th:name="'poll_' + ${poll.id}"
                           th:value="${option.id}"
                           required>
                    <label class="form-check-label fw-bold"
                           th:for="'option_' + ${option.id}"
                           th:text="${option.text}">
                    </label>
                </div>
            </div>
        </div>

        <!-- Блок с возрастом и кнопкой голосования в конце страницы -->
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0"><i class="bi bi-person-badge"></i> Информация о вас</h5>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Ваш возраст (необязательно):</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-calendar"></i></span>
                            <input type="number" name="age" class="form-control" placeholder="Например: 25" min="10" max="120">
                        </div>
                        <small class="text-muted">Указание возраста помогает в статистике</small>
                    </div>
                </div>
            </div>
        </div>

        <!-- Кнопка отправки в конце страницы -->
        <div class="text-center mt-4 mb-5">
            <button type="submit" class="btn btn-vote text-white">
                <i class="bi bi-check-lg"></i> Проголосовать
            </button>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
