<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Голосование</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #17212b;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .tg-card {
            background: #1e2a36;
            border-radius: 16px;
            margin-bottom: 16px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .tg-card-header {
            padding: 20px 20px 12px;
            border-bottom: 1px solid #2b3b47;
        }

        .tg-card-header h1 {
            color: #ffffff;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .tg-card-header .meta {
            color: #8c9aa6;
            font-size: 13px;
        }

        .tg-card-body {
            padding: 16px 20px;
        }

        .question {
            background: #17212b;
            border-radius: 12px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .question-text {
            background: #2b3b47;
            padding: 14px 16px;
            color: #ffffff;
            font-weight: 500;
            font-size: 15px;
        }

        .options {
            padding: 8px 0;
        }

        .option-btn {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            margin: 4px 0;
            background: transparent;
            border: none;
            width: 100%;
            text-align: left;
            cursor: pointer;
            border-radius: 10px;
            transition: background 0.2s;
            font-family: inherit;
        }

        .option-btn:hover {
            background: #2b3b47;
        }

        .option-circle {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid #5e8ea3;
            margin-right: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            transition: all 0.2s;
        }

        .option-btn.selected .option-circle {
            border-color: #31b4ff;
            background: #31b4ff;
        }

        .option-btn.selected .option-circle::after {
            content: "\2713";
            color: #1e2a36;
            font-size: 12px;
            font-weight: bold;
        }

        .option-text {
            color: #e5e9ec;
            font-size: 15px;
            flex: 1;
        }

        .age-input {
            background: #17212b;
            border: 1px solid #2b3b47;
            border-radius: 10px;
            padding: 12px 16px;
            width: 100%;
            color: #ffffff;
            font-size: 15px;
            margin-top: 8px;
        }

        .age-input:focus {
            outline: none;
            border-color: #31b4ff;
        }

        .age-input::placeholder {
            color: #5e8ea3;
        }

        .submit-btn {
            background: #31b4ff;
            border: none;
            border-radius: 12px;
            padding: 14px 24px;
            width: 100%;
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: opacity 0.2s;
        }

        .submit-btn:hover {
            opacity: 0.9;
        }

        .info-banner {
            background: #31b4ff20;
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 20px;
            color: #8c9aa6;
            font-size: 13px;
            text-align: center;
        }

        .expiry-warning {
            background: #ff3b3020;
            color: #ff6b6b;
        }

        hr {
            border-color: #2b3b47;
            margin: 16px 0;
        }

        label {
            color: #8c9aa6;
            font-size: 13px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="tg-card">
        <div class="tg-card-header">
            <h1 th:text="${survey.title}">Опрос</h1>
            <div class="meta">
                <span th:text="${survey.polls.size()}">0</span> вопросов
            </div>
        </div>
        <div class="tg-card-body">
            <div th:if="${link}" class="info-banner" th:classappend="${link.expired ? 'expiry-warning' : ''}">
                <div th:if="${!link.expired}">
                    Ссылка действительна до: <span th:text="${#temporals.format(link.expiresAt, 'dd.MM.yyyy HH:mm')}"></span>
                    <th:block th:if="${link.maxVotes != null}"> · Макс. голосов: <span th:text="${link.maxVotes}"></span></th:block>
                </div>
                <div th:if="${link.expired}">
                    Эта ссылка истекла! Голосование недоступно.
                </div>
            </div>

            <form th:action="@{|/vote/${linkToken}|}" method="post" id="voteForm">
                <div th:each="poll, pollStat : ${survey.polls}" class="question">
                    <div class="question-text">
                        <span th:text="${pollStat.index + 1}"></span>.
                        <span th:text="${poll.question}"></span>
                    </div>
                    <div class="options">
                        <div th:each="option : ${poll.options}">
                            <button type="button" class="option-btn" th:data-poll="${poll.id}" th:data-option="${option.id}">
                                <span class="option-circle"></span>
                                <span class="option-text" th:text="${option.text}"></span>
                            </button>
                        </div>
                        <input type="hidden" th:name="'poll_' + ${poll.id}" th:id="'poll_' + ${poll.id}" required>
                    </div>
                </div>

                <div style="margin-top: 24px;">
                    <label>Ваш возраст (необязательно)</label>
                    <input type="number" name="age" class="age-input" placeholder="Например: 25" min="10" max="120">
                </div>

                <button type="submit" class="submit-btn">Проголосовать</button>
            </form>
        </div>
    </div>
</div>

<script>
    const selectedOptions = {};

    document.querySelectorAll('.option-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            const pollId = this.dataset.poll;
            const optionId = this.dataset.option;

            document.querySelectorAll(`.option-btn[data-poll="${pollId}"]`).forEach(b => {
                b.classList.remove('selected');
            });

            this.classList.add('selected');
            selectedOptions[pollId] = optionId;
            document.getElementById(`poll_${pollId}`).value = optionId;
        });
    });
</script>
</body>
</html>
