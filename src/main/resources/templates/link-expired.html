<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ссылка недействительна</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #17212b;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 400px;
            padding: 20px;
        }

        .tg-card {
            background: #1e2a36;
            border-radius: 16px;
            overflow: hidden;
            text-align: center;
            padding: 40px 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        h2 {
            color: #ff6b6b;
            margin-bottom: 12px;
        }

        p {
            color: #8c9aa6;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .btn {
            display: inline-block;
            background: #31b4ff;
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="tg-card">
        <h2>Ссылка недействительна</h2>
        <p th:text="${message} ?: 'Эта ссылка для голосования истекла или была удалена'"></p>
        <a href="/" class="btn">На главную</a>
    </div>
</div>
</body>
</html>
