<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Онлайн Голосование</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .navbar { background: linear-gradient(135deg, #343a40, #212529); }
        .hero { padding: 60px 0; text-align: center; color: white; }
        .survey-card { transition: all 0.3s; background: white; border-radius: 15px; cursor: pointer; }
        .survey-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .btn-survey { background: linear-gradient(135deg, #667eea, #764ba2); border: none; border-radius: 50px; padding: 10px 30px; }
        .btn-survey:hover { transform: scale(1.05); }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">
            <i class="bi bi-chat-dots"></i> Система голосования
        </a>
        <div>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-box-arrow-right"></i> Выйти
                </button>
            </form>
        </div>
    </div>
</nav>

<div class="hero">
    <div class="container">
        <h1 class="display-3 fw-bold mb-4">Онлайн голосование</h1>
        <p class="lead mb-5">Выберите опрос для участия</p>
    </div>
</div>

<div class="container pb-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <!-- Карточка Админа -->
            <div class="card mb-4 shadow">
                <div class="card-body p-4 text-center">
                    <i class="bi bi-shield-lock-fill display-1 text-primary mb-3"></i>
                    <h3>Панель администратора</h3>
                    <p>Добавление опросов, просмотр результатов и статистики</p>
                    <a href="/login" class="btn btn-primary btn-lg px-5">
                        <i class="bi bi-box-arrow-in-right"></i> Войти как админ
                    </a>
                </div>
            </div>

            <!-- Список доступных опросов -->
            <h2 class="text-white mb-4 text-center">Доступные опросы</h2>

            <div th:if="${surveys.isEmpty()}" class="alert alert-info text-center">
                <i class="bi bi-info-circle"></i> Пока нет активных опросов. Зайдите как администратор и создайте опрос.
            </div>

            <div class="row" th:each="survey : ${surveys}">
                <div class="col-12 mb-4">
                    <div class="survey-card card shadow">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <h3 class="card-title text-dark" th:text="${survey.title}"></h3>
                                    <p class="text-muted mb-0">
                                        <i class="bi bi-question-circle"></i>
                                        <span th:text="${survey.polls.size()}"></span> вопросов
                                    </p>
                                </div>
                                <a th:href="@{/survey/{id}(id=${survey.id})}" class="btn btn-survey text-white">
                                    Пройти опрос <i class="bi bi-arrow-right"></i>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
