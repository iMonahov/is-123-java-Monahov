<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Онлайн Голосование</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; color: white; }
        .hero { padding: 120px 0; text-align: center; }
        .card { transition: all 0.3s; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">🗳️ Голосование</a>
    </div>
</nav>

<div class="hero">
    <div class="container">
        <h1 class="display-3 fw-bold mb-4">Система онлайн-голосования</h1>
        <p class="lead mb-5">Анонимно • Быстро • С статистикой по возрастам</p>

        <div class="row justify-content-center g-4">
            <!-- Карточка Админа -->
            <div class="col-md-5">
                <div class="card text-dark h-100">
                    <div class="card-body p-5">
                        <i class="bi bi-shield-lock-fill display-1 text-primary mb-3"></i>
                        <h3 class="card-title">Панель администратора</h3>
                        <p class="card-text">Добавление опросов, просмотр результатов и статистики</p>
                        <a href="/login" class="btn btn-primary btn-lg px-5">Войти как админ</a>
                    </div>
                </div>
            </div>

            <!-- Карточка Пользователя -->
            <div class="col-md-5">
                <div class="card text-dark h-100">
                    <div class="card-body p-5">
                        <i class="bi bi-pencil-square display-1 text-success mb-3"></i>
                        <h3 class="card-title">Тестирование / Голосование</h3>
                        <p class="card-text">Проголосуйте анонимно и посмотрите, как работает система</p>
                        <a href="/voting" class="btn btn-success btn-lg px-5">Перейти к тестированию</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
