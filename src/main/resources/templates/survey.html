<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Голосование</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .navbar { background: linear-gradient(135deg, #343a40, #212529); }
        .card { border: none; border-radius: 15px; margin-bottom: 20px; }
        .btn-vote { background: linear-gradient(135deg, #28a745, #20c997); border: none; padding: 12px 40px; border-radius: 50px; }
        .btn-vote:hover { transform: scale(1.05); }
        .btn-back { background: linear-gradient(135deg, #6c757d, #5a6268); border: none; padding: 12px 40px; border-radius: 50px; }
        .btn-back:hover { transform: scale(1.05); }
        .alert-success { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .question-card { transition: all 0.3s; }
        .question-card:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">
            <i class="bi bi-chat-dots"></i> Система голосования
        </a>
        <div class="d-flex gap-2">
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-box-arrow-right"></i> Выйти
                </button>
            </form>
        </div>
    </div>
</nav>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <!-- Сообщение об успешном голосовании -->
            <div th:if="${param.voted}" class="alert alert-success text-center shadow mb-4">
                <i class="bi bi-check-circle-fill fs-3"></i>
                <h4 class="mt-2">Спасибо за участие!</h4>
                <p class="mb-0">Ваши ответы успешно сохранены.</p>
            </div>

            <!-- Карточка опроса -->
            <div class="card shadow">
                <div class="card-header bg-dark text-white text-center">
                    <h2 class="mb-0" th:text="${survey.title}"></h2>
                    <small class="text-white-50">Ответьте на все вопросы</small>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/vote}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <input type="hidden" name="surveyId" th:value="${survey.id}"/>

                        <div th:each="poll, pollStat : ${survey.polls}" class="question-card card mb-4">
                            <div class="card-header bg-light">
                                <h5 class="mb-0">
                                    <span class="badge bg-primary rounded-pill me-2" th:text="${pollStat.index + 1}"></span>
                                    <span th:text="${poll.question}"></span>
                                </h5>
                            </div>
                            <div class="card-body">
                                <div th:each="option : ${poll.options}" class="form-check mb-2">
                                    <input type="radio"
                                           class="form-check-input"
                                           th:id="'q_' + ${poll.id} + '_opt_' + ${option.id}"
                                           th:name="'question_' + ${poll.id}"
                                           th:value="${option.id}"
                                           required>
                                    <label class="form-check-label"
                                           th:for="'q_' + ${poll.id} + '_opt_' + ${option.id}"
                                           th:text="${option.text}">
                                    </label>
                                </div>
                            </div>
                        </div>

                        <!-- Возраст -->
                        <div class="card mb-4">
                            <div class="card-header bg-info text-white">
                                <h5 class="mb-0"><i class="bi bi-person-badge"></i> Информация о вас</h5>
                            </div>
                            <div class="card-body">
                                <label class="form-label fw-bold">Ваш возраст (необязательно):</label>
                                <input type="number" name="age" class="form-control" placeholder="Например: 25" min="10" max="120" style="max-width: 200px;">
                                <small class="text-muted">Указание возраста помогает в статистике</small>
                            </div>
                        </div>

                        <!-- Кнопки -->
                        <div class="d-flex justify-content-between gap-3">
                            <a href="/" class="btn btn-back text-white">
                                <i class="bi bi-arrow-left"></i> К списку опросов
                            </a>
                            <button type="submit" class="btn btn-vote text-white">
                                <i class="bi bi-check-lg"></i> Отправить ответы
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
